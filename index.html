<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferramentas Web Application</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        h2 { margin-top: 30px; }
        input { padding: 8px; width: 60%; margin-right: 8px; }
        button { padding: 8px 14px; cursor: pointer; }
        #qrCode { margin-top: 16px; }
        #qrCode canvas, #qrCode img { display: block; margin-top: 8px; }
        #shortenedUrl a { color: #0070f3; word-break: break-all; }
        .loading { color: #888; font-style: italic; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>Ferramentas Web Application</h1>

    <div>
        <h2>WhatsApp Link Generator</h2>
        <form id="whatsappForm">
            <input type="text" id="whatsappNumber" placeholder="Digite o numero do WhatsApp" required />
            <button type="submit">Gerar Link</button>
        </form>
        <p id="whatsappLink"></p>
    </div>

    <div>
        <h2>URL Shortener</h2>
        <form id="urlShortenerForm">
            <input type="url" id="longUrl" placeholder="Cole a URL longa aqui" required />
            <button type="submit" id="shortenBtn">Encurtar URL</button>
        </form>
        <p id="shortenedUrl"></p>
    </div>

    <div>
        <h2>QR Code Generator</h2>
        <form id="qrForm">
            <input type="text" id="qrText" placeholder="Digite texto ou URL" required />
            <button type="submit">Gerar QR Code</button>
        </form>
        <div id="qrCode"></div>
    </div>

    <script>
        // WhatsApp Link Generator
        document.getElementById('whatsappForm').onsubmit = function (e) {
            e.preventDefault();
            const number = document.getElementById('whatsappNumber').value;
            const link = 'https://wa.me/' + number;
            document.getElementById('whatsappLink').innerHTML = '<a href="' + link + '" target="_blank">' + link + '</a>';
        };

        // URL Shortener usando API do TinyURL
        document.getElementById('urlShortenerForm').onsubmit = function (e) {
            e.preventDefault();
            const longUrl = document.getElementById('longUrl').value;
            const output = document.getElementById('shortenedUrl');
            const btn = document.getElementById('shortenBtn');

            output.innerHTML = '<span class="loading">Encurtando...</span>';
            btn.disabled = true;

            fetch('https://tinyurl.com/api-create.php?url=' + encodeURIComponent(longUrl))
                .then(function(res) {
                    if (!res.ok) throw new Error('Erro na resposta');
                    return res.text();
                })
                .then(function(shortUrl) {
                    output.innerHTML = 'URL encurtada: <a href="' + shortUrl + '" target="_blank">' + shortUrl + '</a>';
                })
                .catch(function() {
                    output.innerHTML = '<span class="error">Erro ao encurtar. Verifique a URL e tente novamente.</span>';
                })
                .finally(function() {
                    btn.disabled = false;
                });
        };

        // QR Code Generator
        document.getElementById('qrForm').onsubmit = function (e) {
            e.preventDefault();
            const qrText = document.getElementById('qrText').value;
            const container = document.getElementById('qrCode');
            container.innerHTML = '';
            new QRCode(container, {
                text: qrText,
                width: 200,
                height: 200
            });
        };
    </script>
</body>
</html>
